spring.application.name=chat
server.address=0.0.0.0

# Database — set these as environment variables on Render/any cloud host
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5433/chat_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Redis — set as environment variable on cloud host
spring.data.redis.url=${SPRING_REDIS_URL:redis://127.0.0.1:6379}

# JWT — MUST be a strong secret in production (set JWT_SECRET env var)
jwt.secret=${JWT_SECRET:local-dev-secret-replace-this-in-production-1234567890abcdef}
jwt.expiration=86400000

# Fast2SMS — set FAST2SMS_API_KEY env var on cloud host
# 1. Sign up at https://www.fast2sms.com (free for Indian numbers)
# 2. Get API key from Dashboard -> Dev API
# 3. Set it as an environment variable — never commit real keys!
fast2sms.api.key=${FAST2SMS_API_KEY:DEMO}

# Dev mode: returns OTP in API response when SMS fails
# Set to false in production!
otp.dev.mode=${OTP_DEV_MODE:true}
