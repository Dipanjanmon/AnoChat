spring.application.name=chat
server.address=0.0.0.0

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://127.0.0.1:5433/chat_db}
spring.datasource.username=${DB_USER:user}
spring.datasource.password=${DB_PASS:password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# Let Hibernate 7 auto-detect the dialect (required in Spring Boot 4)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# Redis
spring.data.redis.url=${REDIS_URL:redis://127.0.0.1:6379}

# JWT
jwt.secret=${JWT_SECRET:local-dev-secret-replace-this-in-production-1234567890abcdef}
jwt.expiration=86400000

# Fast2SMS
fast2sms.api.key=${FAST2SMS_KEY:DEMO}

# Dev mode OTP
otp.dev.mode=${OTP_DEV_MODE:true}
